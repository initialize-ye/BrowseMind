<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrowseMind</title>
  <style>
    :root {
      --bg: oklch(96.5% 0.006 58);
      --surface: oklch(100% 0 0);
      --surface-2: oklch(93% 0.008 58);
      --surface-3: oklch(89% 0.01 58);
      --text: oklch(18% 0.012 58);
      --muted: oklch(52% 0.016 58);
      --line: oklch(88% 0.01 58);
      --accent: oklch(52% 0.14 275);
      --accent-soft: oklch(90% 0.04 275);
      --accent-glow: oklch(52% 0.14 275 / 0.08);
      --green: oklch(52% 0.14 150);
      --green-soft: oklch(92% 0.04 150);
      --red: oklch(52% 0.16 25);
      --red-soft: oklch(90% 0.05 25);
      --yellow: oklch(70% 0.13 85);
      --yellow-soft: oklch(94% 0.04 85);
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      /* Chart.js palette — hex required for Canvas API */
      --chart-1: #6366f1;
      --chart-2: #34d399;
      --chart-3: #fbbf24;
      --chart-4: #f87171;
      --chart-5: #a1a1aa;
      --chart-6: #818cf8;
    }
    html[data-theme="dark"] {
      --bg: oklch(13% 0.008 58);
      --surface: oklch(18% 0.01 58);
      --surface-2: oklch(22% 0.012 58);
      --surface-3: oklch(26% 0.014 58);
      --text: oklch(92% 0.006 58);
      --muted: oklch(62% 0.012 58);
      --line: oklch(28% 0.012 58);
      --accent: oklch(68% 0.14 275);
      --accent-soft: oklch(30% 0.08 275);
      --accent-glow: oklch(68% 0.14 275 / 0.12);
      --green: oklch(68% 0.14 150);
      --green-soft: oklch(22% 0.04 150);
      --red: oklch(68% 0.16 25);
      --red-soft: oklch(24% 0.05 25);
      --yellow: oklch(75% 0.13 85);
      --yellow-soft: oklch(22% 0.04 85);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 420px;
      min-height: 520px;
      max-height: 640px;
      overflow-y: auto;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
      color: var(--text);
      background: var(--bg);
      font-size: 14px;
      line-height: 1.5;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 999px; }

    .container { padding: 20px 18px 14px; }

    header { margin-bottom: 20px; }
    h1 {
      font-size: 26px;
      line-height: 1.15;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .brand-mark {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }
    .brand-mark svg { display: block; width: 100%; height: 100%; }
    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12.5px;
      letter-spacing: 0.01em;
    }

    /* Entrance animation */
    .fade-in { animation: fadeSlideUp 0.45s var(--ease-out) both; }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .loading, .empty-state {
      padding: 48px 20px;
      text-align: center;
      color: var(--muted);
      border-radius: 14px;
      background: var(--accent-glow);
    }
    .spinner {
      width: 28px;
      height: 28px;
      margin: 0 auto 14px;
      border-radius: 50%;
      border: 3px solid var(--accent-soft);
      border-top-color: var(--accent);
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Stat bar — asymmetric, not a grid */
    .stat-bar {
      display: flex;
      gap: 2px;
      margin-bottom: 18px;
      border-radius: 14px;
      overflow: hidden;
    }
    .stat-block {
      flex: 1;
      padding: 16px 14px;
      background: var(--surface);
      min-width: 0;
    }
    .stat-block:first-child {
      flex: 1.35;
      border-radius: 14px 0 0 14px;
    }
    .stat-block:last-child {
      border-radius: 0 14px 14px 0;
    }
    .stat-block:only-child { border-radius: 14px; }
    .stat-value {
      font-size: 26px;
      line-height: 1.05;
      font-weight: 700;
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }
    .stat-block:first-child .stat-value {
      font-size: 40px;
      letter-spacing: -0.04em;
      color: var(--accent);
    }
    .stat-label {
      margin-top: 5px;
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    /* Chart card */
    .chart-card {
      margin-bottom: 18px;
      padding: 18px 18px 14px;
      border-radius: 16px;
      background: var(--surface);
      border-top: 2.5px solid var(--accent);
    }
    .chart-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text);
    }
    .chart-tabs {
      display: flex;
      gap: 2px;
      padding: 4px;
      border-radius: 10px;
      background: var(--surface-2);
    }
    .chart-tab {
      all: unset;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      background: transparent;
      transition: background 0.2s var(--ease-out), color 0.2s var(--ease-out);
    }
    .chart-tab:hover { color: var(--text); }
    .chart-tab:focus-visible { outline: none; box-shadow: 0 0 0 3px var(--accent-glow); }
    .chart-tab.active {
      color: var(--accent);
      background: var(--surface);
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .chart-container {
      position: relative;
      height: 190px;
    }
    .chart-container canvas { max-height: 210px; }

    /* Section dividers — not cards */
    .section {
      margin-bottom: 16px;
    }
    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 10px;
      padding: 0 2px;
    }
    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .section-sub {
      color: var(--muted);
      font-size: 11px;
    }

    .category-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 10px;
      margin-bottom: 4px;
      background: var(--surface);
      transition: background 0.15s var(--ease-out);
    }
    .category-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .cat-icon { width: 16px; height: 16px; vertical-align: -2px; margin-right: 2px; flex-shrink: 0; }
    .category-name { flex: 1; font-size: 13px; font-weight: 500; color: var(--text); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .category-meta { color: var(--muted); font-size: 11.5px; white-space: nowrap; }
    .category-bar { height: 5px; margin-top: 6px; border-radius: 999px; background: var(--surface-2); overflow: hidden; }
    .category-bar-fill { height: 100%; border-radius: inherit; background: var(--accent); transition: width 0.4s var(--ease-out); }

    .category-item-compact {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--line);
      font-size: 12.5px;
    }
    .category-item-compact:last-child { border-bottom: 0; }
    .category-item-compact .category-name { flex: 1; }
    .category-item-compact .category-value { color: var(--accent); font-weight: 600; font-variant-numeric: tabular-nums; }

    .record-list { max-height: 180px; overflow-y: auto; }
    .record-item {
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 2px;
      background: var(--surface);
      font-size: 12.5px;
    }
    .record-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
    .record-meta { margin-top: 3px; color: var(--muted); font-size: 11px; font-variant-numeric: tabular-nums; }

    .blackhole-item {
      padding: 12px 14px;
      margin-bottom: 6px;
      border-radius: 12px;
      background: var(--red-soft);
      font-size: 12.5px;
    }
    .blackhole-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .blackhole-domain { font-weight: 600; }
    .blackhole-duration { color: var(--red); font-weight: 700; font-variant-numeric: tabular-nums; }
    .blackhole-meta { margin-top: 5px; color: var(--muted); font-size: 11px; }

    .goal-item {
      padding: 12px 14px;
      margin-bottom: 6px;
      border-radius: 12px;
      background: var(--surface);
      font-size: 12.5px;
    }
    .goal-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .goal-type { font-weight: 600; }
    .goal-meta { margin-top: 6px; display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--muted); }
    .goal-status { padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .goal-status.achieved { background: var(--green-soft); color: var(--green); }
    .goal-status.warning { background: var(--yellow-soft); color: oklch(45% 0.12 85); }
    .goal-status.normal { background: var(--accent-soft); color: var(--accent); }
    .goal-progress-bar { height: 4px; margin-top: 8px; border-radius: 999px; background: var(--surface-2); overflow: hidden; }
    .goal-progress-fill { height: 100%; border-radius: inherit; background: var(--green); transition: width 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
    .goal-progress-fill.warning { background: var(--yellow); }
    .goal-item.achieved { animation: goalCelebrate 0.5s cubic-bezier(0.25, 1, 0.5, 1); border-left: 3px solid var(--green); }
    .goal-status.achieved::before { content: '✓ '; }
    @keyframes goalCelebrate { 0% { transform: scale(1); } 40% { transform: scale(1.02); } 100% { transform: scale(1); } }
    .goal-delete { cursor: pointer; color: var(--muted); font-size: 16px; line-height: 1; padding: 2px; background: transparent; border: 0; min-width: 44px; min-height: 44px; display: inline-flex; align-items: center; justify-content: center; }
    .goal-delete:hover { color: var(--red); }
    .goal-delete:focus-visible { outline: none; box-shadow: 0 0 0 3px var(--accent-glow); border-radius: 4px; }

    .attention-stats { display: flex; gap: 10px; margin-top: 8px; }
    .attention-stat-item {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      background: var(--accent-soft);
    }
    .attention-stat-value { color: var(--accent); font-size: 22px; line-height: 1.1; font-weight: 700; font-variant-numeric: tabular-nums; }
    .attention-stat-label { color: var(--muted); font-size: 11px; margin-top: 3px; }

    /* Action bar */
    .actions {
      position: sticky;
      bottom: 0;
      display: flex;
      gap: 6px;
      padding: 14px 0 4px;
      background: linear-gradient(transparent, var(--bg) 28%);
      z-index: 20;
    }
    .action-btn {
      flex: 1;
      min-height: 42px;
      padding: 10px;
      border: 0;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      background: var(--surface);
      color: var(--text);
      transition: background 0.18s var(--ease-out), color 0.18s var(--ease-out), box-shadow 0.18s var(--ease-out), transform 0.1s var(--ease-out);
    }
    .action-btn:hover { background: var(--surface-2); }
    .action-btn:active { transform: scale(0.97); }
    .action-btn.primary {
      background: var(--accent);
      color: oklch(100% 0 0);
      box-shadow: 0 2px 8px oklch(52% 0.14 275 / 0.25);
    }
    .action-btn.primary:hover { background: color-mix(in oklch, var(--accent) 85%, black); box-shadow: 0 4px 12px oklch(52% 0.14 275 / 0.35); }
    .action-btn.secondary {
      background: var(--accent-soft);
      color: var(--accent);
    }
    .action-btn.secondary:hover { background: color-mix(in oklch, var(--accent) 20%, var(--surface)); }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: oklch(0% 0 0 / 0.32);
    }
    .modal-content {
      width: min(100%, 360px);
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
      padding: 24px;
      border-radius: 18px;
      color: var(--text);
      background: var(--surface);
      box-shadow: 0 12px 40px oklch(0% 0 0 / 0.18);
    }
    .modal-close {
      position: absolute;
      top: 12px; right: 16px;
      cursor: pointer;
      color: var(--muted);
      font-size: 22px;
      line-height: 1;
      background: transparent;
      border: 0;
      padding: 4px;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s var(--ease-out);
    }
    .modal-close:hover { color: var(--text); }
    .modal-close:focus-visible { outline: none; box-shadow: 0 0 0 3px var(--accent-glow); border-radius: 4px; }
    .modal h2 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 18px;
    }
    .ai-section { margin-bottom: 16px; }
    .ai-section h3 { margin-bottom: 8px; color: var(--accent); font-size: 13px; font-weight: 600; }
    .ai-section p, .ai-section li { line-height: 1.6; font-size: 13px; }
    .ai-section ul { list-style: none; padding: 0; }
    .ai-section li { padding: 8px 0; border-bottom: 1px solid var(--line); }
    .ai-section li:last-child { border-bottom: 0; }
    .ai-loading { text-align: center; padding: 38px; }

    /* AI Analysis — enhanced cards */
    .ai-summary-card {
      padding: 20px 18px;
      border-radius: 14px;
      background: linear-gradient(135deg, oklch(48% 0.16 300), oklch(40% 0.12 330));
      color: oklch(98% 0 0);
      font-size: 13.5px;
      line-height: 1.65;
      margin-bottom: 16px;
    }
    .ai-summary-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      opacity: 0.75;
      margin-bottom: 6px;
    }
    .ai-bar-chart {
      margin-bottom: 16px;
      padding: 14px 16px;
      border-radius: 12px;
      background: var(--surface);
    }
    .ai-bar-chart-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .ai-stacked-bar {
      display: flex;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      gap: 2px;
      margin-bottom: 10px;
    }
    .ai-stacked-segment {
      height: 100%;
      border-radius: 999px;
      min-width: 4px;
      transition: width 0.5s var(--ease-out);
    }
    .ai-bar-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 14px;
    }
    .ai-legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--muted);
    }
    .ai-legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .ai-legend-pct {
      font-weight: 600;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .ai-table-wrap {
      margin-bottom: 16px;
      border-radius: 12px;
      overflow: hidden;
      background: var(--surface);
    }
    .ai-table-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      padding: 12px 14px 8px;
    }
    .ai-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12.5px;
    }
    .ai-table th {
      text-align: left;
      padding: 8px 14px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      border-bottom: 1px solid var(--line);
    }
    .ai-table td {
      padding: 8px 14px;
      border-bottom: 1px solid var(--line);
    }
    .ai-table tr:last-child td { border-bottom: 0; }
    .ai-table .domain-name {
      font-weight: 500;
      color: var(--text);
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .ai-table .domain-dur {
      font-weight: 600;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .ai-card-list {
      list-style: none;
      padding: 0;
      margin: 0 0 14px;
    }
    .ai-issue-card {
      padding: 12px 14px;
      border-radius: 10px;
      background: var(--yellow-soft);
      border-left: 3px solid var(--yellow);
      margin-bottom: 6px;
      font-size: 12.5px;
      line-height: 1.5;
      color: var(--text);
    }
    .ai-suggestion-card {
      padding: 12px 14px;
      border-radius: 10px;
      background: var(--green-soft);
      border-left: 3px solid var(--green);
      margin-bottom: 6px;
      font-size: 12.5px;
      line-height: 1.5;
      color: var(--text);
    }

    label { display: block; margin-bottom: 6px; font-size: 12px; font-weight: 600; color: var(--muted); }
    select, input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      font: inherit;
      font-size: 13px;
      transition: border-color 0.18s var(--ease-out), box-shadow 0.18s var(--ease-out);
    }
    select:focus, input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

    .empty-line {
      text-align: center;
      color: var(--muted);
      padding: 18px 10px;
      font-size: 12.5px;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><span class="brand-mark"><svg viewBox="0 0 22 22" fill="none"><rect x="1" y="1" width="20" height="20" rx="4" fill="var(--accent)"/><text x="11" y="16" font-size="13" text-anchor="middle" fill="oklch(100% 0 0)">🧠</text></svg></span>BrowseMind</h1>
      <p class="subtitle">浏览行为分析</p>
    </header>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p id="loadingMsg" style="font-size:13px;">正在唤醒分析引擎...</p>
    </div>

    <div id="content" style="display: none;">
      <div class="stat-bar" id="todayOverview">
        <div class="stat-block">
          <div class="stat-value" id="todayDuration">0m</div>
          <div class="stat-label">今日时长</div>
        </div>
        <div class="stat-block">
          <div class="stat-value" id="todayVisits">0</div>
          <div class="stat-label">今日访问</div>
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-card-header">
          <span>可视化分析</span>
          <div class="chart-tabs">
            <button class="chart-tab active" data-chart="pie">占比</button>
            <button class="chart-tab" data-chart="bar">时段</button>
            <button class="chart-tab" data-chart="line">趋势</button>
          </div>
        </div>
        <div class="chart-container">
          <canvas id="mainChart"></canvas>
        </div>
      </div>

      <div class="section">
        <div class="section-header">
          <span class="section-title">今日分类</span>
        </div>
        <div id="todayCategoryStats"></div>
      </div>

      <div class="section">
        <div class="section-header">
          <span class="section-title"><span id="categoryStatsLabel">7 天</span>分类</span>
          <span class="section-sub">按时长</span>
        </div>
        <div id="categoryStats"></div>
      </div>

      <div class="section">
        <div class="section-header">
          <span class="section-title"><span id="weeklyStatsLabel">7 天</span>统计</span>
        </div>
        <div class="stat-bar">
          <div class="stat-block">
            <div class="stat-value" id="totalVisits">0</div>
            <div class="stat-label">总访问</div>
          </div>
          <div class="stat-block">
            <div class="stat-value" id="uniqueSites">0</div>
            <div class="stat-label">独立网站</div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-header">
          <span class="section-title">最近访问</span>
        </div>
        <div class="record-list" id="recentRecords"></div>
      </div>

      <div class="section">
        <div class="section-header">
          <span class="section-title">今日目标</span>
        </div>
        <div id="goalsContainer">
          <p class="empty-line">暂无目标</p>
        </div>
        <button id="addGoalBtn" class="action-btn secondary" style="width:100%;margin-top:6px;">添加目标</button>
      </div>

      <div class="section">
        <div class="section-header">
          <span class="section-title">时间黑洞</span>
        </div>
        <div id="blackholeStats">
          <p class="empty-line">同步后自动更新</p>
        </div>
      </div>

      <div class="section">
        <div class="section-header">
          <span class="section-title">专注曲线</span>
        </div>
        <div class="chart-container" style="height: 140px; margin-bottom: 8px;">
          <canvas id="attentionChart"></canvas>
        </div>
        <div id="attentionStats">
          <p class="empty-line">同步后自动更新</p>
        </div>
      </div>

      <div class="actions">
        <button class="action-btn" id="refreshBtn">刷新</button>
        <button class="action-btn" id="dashboardBtn">仪表盘</button>
        <button class="action-btn primary" id="syncBtn">同步</button>
        <button class="action-btn secondary" id="aiAnalysisBtn">AI 分析</button>
      </div>
    </div>

    <div id="aiAnalysisModal" class="modal" style="display: none;">
      <div class="modal-content">
        <button class="modal-close" id="closeModal" aria-label="关闭">&times;</button>
        <h2>AI 分析结果</h2>
        <div id="aiAnalysisContent"></div>
      </div>
    </div>

    <div id="goalModal" class="modal" style="display: none;">
      <div class="modal-content">
        <button class="modal-close" id="closeGoalModal" aria-label="关闭">&times;</button>
        <h2>设置目标</h2>
        <div style="margin-bottom: 16px;">
          <label>目标类型</label>
          <select id="goalTypeSelect">
            <option value="daily_learning">每日学习时长</option>
            <option value="daily_entertainment">每日娱乐时长限制</option>
            <option value="daily_coding">每日编程时长</option>
            <option value="daily_social">每日社交时长限制</option>
          </select>
        </div>
        <div style="margin-bottom: 16px;">
          <label>目标时长（分钟）</label>
          <input type="number" id="goalDurationInput" min="1" max="1440" value="60">
        </div>
        <button id="saveGoalBtn" class="action-btn primary" style="width:100%;">添加目标</button>
      </div>
    </div>

    <div id="emptyState" class="empty-state" style="display: none;">
      <div style="font-size: 36px; margin-bottom: 10px;">🧠</div>
      <p style="font-size:14px;font-weight:600;">数据正在路上</p>
      <p style="font-size: 12px; margin-top: 6px; color: var(--muted);">正常浏览几个页面，这里就会自动亮起来</p>
    </div>
  </div>

  <script src="chart.min.js" defer></script>
  <script src="dataProcessor.js" defer></script>
  <script src="dataSync.js" defer></script>
  <script src="popup.js" defer></script>
</body>
</html>
