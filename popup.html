<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrowseMind</title>
  <style>
    :root {
      --paper: #f5efe3;
      --paper-deep: #eadfcf;
      --ink: #231f19;
      --muted: #786f63;
      --line: rgba(35, 31, 25, 0.12);
      --card: rgba(255, 251, 243, 0.86);
      --amber: #d98c2b;
      --moss: #516b48;
      --clay: #a85338;
      --blue: #3f5f7f;
      --shadow: 0 18px 45px rgba(58, 44, 29, 0.16);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 420px;
      min-height: 560px;
      max-height: 640px;
      overflow-y: auto;
      font-family: ui-serif, Georgia, 'Times New Roman', 'Noto Serif SC', serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 0%, rgba(217, 140, 43, 0.22), transparent 34%),
        radial-gradient(circle at 94% 18%, rgba(81, 107, 72, 0.18), transparent 30%),
        linear-gradient(145deg, var(--paper), #f9f4ea 52%, var(--paper-deep));
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.36;
      background-image:
        linear-gradient(rgba(35,31,25,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(35,31,25,.04) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: linear-gradient(to bottom, black, transparent 82%);
    }

    .container { position: relative; padding: 18px; }

    header {
      position: relative;
      padding: 18px 18px 16px;
      margin-bottom: 14px;
      border: 1px solid var(--line);
      border-radius: 24px 24px 10px 24px;
      background: rgba(255, 248, 236, 0.74);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    header::after {
      content: '';
      position: absolute;
      right: -34px;
      top: -42px;
      width: 120px;
      height: 120px;
      border: 1px solid rgba(217,140,43,.35);
      border-radius: 50%;
      box-shadow: inset 0 0 0 16px rgba(217,140,43,.07);
    }

    h1 {
      position: relative;
      font-size: 28px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.05em;
    }

    .subtitle {
      position: relative;
      margin-top: 8px;
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .loading, .empty-state {
      margin: 24px 0;
      padding: 34px 18px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 24px;
      background: rgba(255,251,243,.6);
    }

    .spinner {
      width: 34px;
      height: 34px;
      margin: 0 auto 12px;
      border-radius: 50%;
      border: 2px solid rgba(35,31,25,.12);
      border-top-color: var(--amber);
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .card {
      position: relative;
      padding: 15px;
      margin-bottom: 12px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--card);
      box-shadow: 0 10px 28px rgba(58,44,29,.08);
      backdrop-filter: blur(10px);
    }

    .card:nth-child(2n) { border-radius: 10px 20px 20px 20px; }
    .card:nth-child(3n) { border-radius: 20px 10px 20px 20px; }

    .card-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      font-family: ui-sans-serif, system-ui, sans-serif;
      color: var(--ink);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    .card-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--line), transparent);
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat-item {
      padding: 14px 12px;
      border-radius: 16px;
      background: linear-gradient(160deg, rgba(255,255,255,.72), rgba(234,223,207,.58));
      border: 1px solid rgba(35,31,25,.08);
    }

    .stat-value {
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: 25px;
      font-weight: 900;
      letter-spacing: -0.05em;
      color: var(--ink);
    }

    .stat-label {
      margin-top: 4px;
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: 11px;
      color: var(--muted);
    }

    .tab-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(234,223,207,.52);
    }

    button {
      width: 100%;
      border: 0;
      cursor: pointer;
      font-family: ui-sans-serif, system-ui, sans-serif;
      transition: transform .18s ease, background .18s ease, color .18s ease, box-shadow .18s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0) scale(.99); }

    .tab-btn {
      padding: 8px 6px;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    .tab-btn.active {
      background: var(--ink);
      color: #fbf0df;
      box-shadow: 0 8px 18px rgba(35,31,25,.18);
    }

    .chart-container {
      position: relative;
      height: 200px;
      margin-top: 14px;
    }

    .chart-container canvas { max-height: 220px; }

    .category-item { margin-bottom: 14px; }
    .category-header { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
    .category-icon { font-size: 16px; }
    .category-name { flex: 1; font-family: ui-sans-serif, system-ui, sans-serif; font-size: 12px; font-weight: 800; }
    .category-percentage { font-family: ui-sans-serif, system-ui, sans-serif; color: var(--amber); font-size: 13px; font-weight: 900; }
    .category-bar { height: 7px; overflow: hidden; border-radius: 999px; background: rgba(35,31,25,.08); }
    .category-bar-fill { height: 100%; border-radius: inherit; background: linear-gradient(90deg, var(--moss), var(--amber)); transition: width .35s ease; }
    .category-meta { margin-top: 6px; font-family: ui-sans-serif, system-ui, sans-serif; font-size: 10px; color: var(--muted); }

    .category-item-compact, .record-item {
      padding: 9px 0;
      border-bottom: 1px solid var(--line);
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: 12px;
    }
    .category-item-compact { display: flex; align-items: center; gap: 8px; }
    .category-item-compact:last-child, .record-item:last-child { border-bottom: 0; }
    .category-item-compact .category-name { flex: 1; }
    .category-item-compact .category-value { color: var(--amber); font-weight: 900; }
    .record-list { max-height: 190px; overflow-y: auto; }
    .record-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 800; color: var(--ink); }
    .record-meta { margin-top: 3px; color: var(--muted); font-size: 10px; }

    .blackhole-item, .goal-item {
      padding: 12px;
      margin-bottom: 8px;
      border-radius: 14px;
      background: rgba(255,255,255,.48);
      border: 1px solid var(--line);
    }

    .blackhole-item { background: color-mix(in srgb, var(--clay) 10%, white 70%); }
    .blackhole-header, .goal-header, .goal-meta { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .blackhole-domain, .goal-type { font-family: ui-sans-serif, system-ui, sans-serif; font-weight: 900; font-size: 12px; }
    .blackhole-duration { color: var(--clay); font-family: ui-sans-serif, system-ui, sans-serif; font-weight: 900; font-size: 13px; }
    .blackhole-meta, .goal-meta { margin-top: 6px; color: var(--muted); font-family: ui-sans-serif, system-ui, sans-serif; font-size: 10px; }

    .attention-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px; }
    .attention-stat-item { padding: 10px; border-radius: 14px; background: rgba(81,107,72,.1); border: 1px solid rgba(81,107,72,.16); }
    .attention-stat-value { font-family: ui-sans-serif, system-ui, sans-serif; color: var(--moss); font-size: 20px; font-weight: 950; }
    .attention-stat-label { font-family: ui-sans-serif, system-ui, sans-serif; color: var(--muted); font-size: 10px; }

    .goal-status { padding: 3px 8px; border-radius: 999px; font-family: ui-sans-serif, system-ui, sans-serif; font-size: 10px; font-weight: 900; }
    .goal-status.achieved { background: rgba(81,107,72,.16); color: var(--moss); }
    .goal-status.warning { background: rgba(217,140,43,.18); color: #8b551d; }
    .goal-status.normal { background: rgba(63,95,127,.14); color: var(--blue); }
    .goal-progress-bar { height: 8px; margin-top: 10px; overflow: hidden; border-radius: 999px; background: rgba(35,31,25,.08); }
    .goal-progress-fill { height: 100%; background: linear-gradient(90deg, var(--moss), var(--amber)); border-radius: inherit; }
    .goal-progress-fill.warning { background: linear-gradient(90deg, var(--amber), var(--clay)); }
    .goal-delete { cursor: pointer; color: var(--muted); font-size: 18px; margin-left: 5px; }
    .goal-delete:hover { color: var(--clay); }

    .actions {
      position: sticky;
      bottom: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 12px 0 2px;
      background: linear-gradient(transparent, var(--paper) 22%);
      z-index: 20;
    }

    .action-btn, #addGoalBtn, #saveGoalBtn {
      padding: 11px 10px;
      border-radius: 14px;
      color: #fbf0df;
      background: var(--ink);
      font-weight: 900;
      font-size: 12px;
      box-shadow: 0 10px 24px rgba(35,31,25,.16);
    }
    #syncBtn { background: var(--moss); }
    #advancedAnalysisBtn { background: var(--clay); }
    #aiAnalysisBtn { background: var(--amber); color: var(--ink); }
    #dashboardBtn { background: var(--blue); }
    #addGoalBtn { margin-top: 12px; background: var(--moss); }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(35,31,25,.42);
      backdrop-filter: blur(8px);
    }

    .modal-content {
      width: min(100%, 360px);
      max-height: 82vh;
      overflow-y: auto;
      position: relative;
      padding: 24px;
      border-radius: 24px;
      color: var(--ink);
      background: #fff8ec;
      border: 1px solid var(--line);
      box-shadow: 0 24px 70px rgba(35,31,25,.26);
    }
    .modal-close { position: absolute; top: 12px; right: 16px; cursor: pointer; color: var(--muted); font-size: 24px; }
    .modal-close:hover { color: var(--ink); }
    .ai-section { margin-bottom: 18px; }
    .ai-section h3 { margin-bottom: 9px; color: var(--moss); font-family: ui-sans-serif, system-ui, sans-serif; font-size: 14px; }
    .ai-section p, .ai-section li { line-height: 1.65; font-size: 13px; }
    .ai-section ul { list-style: none; padding: 0; }
    .ai-section li { padding: 8px 0; border-bottom: 1px solid var(--line); }
    .ai-loading { text-align: center; padding: 38px; }

    label { display: block; margin-bottom: 8px; font-family: ui-sans-serif, system-ui, sans-serif; font-size: 12px; font-weight: 900; }
    select, input {
      width: 100%;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255,255,255,.72);
      color: var(--ink);
      outline: none;
    }
    select:focus, input:focus { border-color: var(--amber); box-shadow: 0 0 0 3px rgba(217,140,43,.18); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>BrowseMind</h1>
      <p class="subtitle">Personal attention atlas</p>
    </header>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>正在整理你的浏览轨迹...</p>
    </div>

    <div id="content" style="display: none;">
      <div class="card">
        <div class="card-title">今日概览</div>
        <div class="stat-grid">
          <div class="stat-item">
            <div class="stat-value" id="todayVisits">0</div>
            <div class="stat-label">访问次数</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="todayDuration">0分钟</div>
            <div class="stat-label">浏览时长</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">可视化分析</div>
        <div class="tab-buttons">
          <button class="tab-btn active" data-chart="pie">分类占比</button>
          <button class="tab-btn" data-chart="bar">时间分布</button>
          <button class="tab-btn" data-chart="line">每日趋势</button>
        </div>
        <div class="chart-container">
          <canvas id="mainChart"></canvas>
        </div>
      </div>

      <div class="card">
        <div class="card-title">今日分类</div>
        <div id="todayCategoryStats"></div>
      </div>

      <div class="card">
        <div class="card-title">七天分类</div>
        <div id="categoryStats"></div>
      </div>

      <div class="card">
        <div class="card-title">七天统计</div>
        <div class="stat-grid">
          <div class="stat-item">
            <div class="stat-value" id="totalVisits">0</div>
            <div class="stat-label">总访问</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="uniqueSites">0</div>
            <div class="stat-label">独立网站</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">最近访问</div>
        <div class="record-list" id="recentRecords"></div>
      </div>

      <div class="card">
        <div class="card-title">今日目标</div>
        <div id="goalsContainer">
          <p style="text-align: center; color: #786f63; padding: 20px;">暂无目标</p>
        </div>
        <button id="addGoalBtn">添加目标</button>
      </div>

      <div class="card">
        <div class="card-title">时间黑洞</div>
        <div id="blackholeStats">
          <p style="text-align: center; color: #786f63; padding: 20px;">连接后端后自动更新</p>
        </div>
      </div>

      <div class="card">
        <div class="card-title">注意力曲线</div>
        <div class="chart-container" style="height: 150px;">
          <canvas id="attentionChart"></canvas>
        </div>
        <div id="attentionStats" style="margin-top: 12px;">
          <p style="text-align: center; color: #786f63;">连接后端后自动更新</p>
        </div>
      </div>

      <div class="actions">
        <button class="action-btn" id="refreshBtn">刷新</button>
        <button class="action-btn" id="dashboardBtn">仪表盘</button>
        <button class="action-btn" id="syncBtn">同步云端</button>
        <button class="action-btn" id="advancedAnalysisBtn">高级分析</button>
        <button class="action-btn" id="aiAnalysisBtn">AI 分析</button>
      </div>
    </div>

    <div id="aiAnalysisModal" class="modal" style="display: none;">
      <div class="modal-content">
        <span class="modal-close" id="closeModal">&times;</span>
        <h2 style="font-size: 22px; margin-bottom: 16px;">AI 智能分析</h2>
        <div id="aiAnalysisContent"></div>
      </div>
    </div>

    <div id="goalModal" class="modal" style="display: none;">
      <div class="modal-content">
        <span class="modal-close" id="closeGoalModal">&times;</span>
        <h2 style="font-size: 22px; margin-bottom: 16px;">设置目标</h2>
        <div style="margin-bottom: 16px;">
          <label>目标类型</label>
          <select id="goalTypeSelect">
            <option value="daily_learning">每日学习时长</option>
            <option value="daily_entertainment">每日娱乐时长限制</option>
            <option value="daily_coding">每日编程时长</option>
            <option value="daily_social">每日社交时长限制</option>
          </select>
        </div>
        <div style="margin-bottom: 16px;">
          <label>目标时长（分钟）</label>
          <input type="number" id="goalDurationInput" min="1" max="1440" value="60">
        </div>
        <button id="saveGoalBtn">保存目标</button>
      </div>
    </div>

    <div id="emptyState" class="empty-state" style="display: none;">
      <div style="font-size: 46px;">◇</div>
      <p>暂无浏览数据</p>
      <p style="font-size: 12px; margin-top: 8px;">开始浏览网页后，这里会生成你的注意力地图</p>
    </div>
  </div>

  <script src="chart.min.js"></script>
  <script src="dataProcessor.js"></script>
  <script src="dataSync.js"></script>
  <script src="popup.js"></script>
</body>
</html>
