<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrowseMind</title>
  <style>
    :root {
      --bg: #f8fafd;
      --surface: #ffffff;
      --surface-2: #f1f3f4;
      --text: #202124;
      --muted: #5f6368;
      --line: #dadce0;
      --blue: #1a73e8;
      --blue-soft: #e8f0fe;
      --green: #188038;
      --green-soft: #e6f4ea;
      --yellow: #f9ab00;
      --yellow-soft: #fef7e0;
      --red: #d93025;
      --red-soft: #fce8e6;
      --shadow: 0 1px 2px rgba(60,64,67,.16), 0 1px 3px rgba(60,64,67,.12);
    }
    html[data-theme="dark"] {
      --bg: #1a1b1e;
      --surface: #242529;
      --surface-2: #2c2d32;
      --text: #e3e3e8;
      --muted: #90919e;
      --line: #37383f;
      --blue: #5b9cf6;
      --blue-soft: #1e2a4a;
      --green: #34d399;
      --green-soft: #1a3328;
      --red: #f87171;
      --red-soft: #3b1f24;
      --yellow: #fbbf24;
      --yellow-soft: #3a2e14;
      --shadow: 0 1px 2px rgba(0,0,0,.32), 0 1px 3px rgba(0,0,0,.24);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 420px;
      min-height: 560px;
      max-height: 640px;
      overflow-y: auto;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .container { padding: 16px; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      padding: 6px 2px;
    }

    h1 {
      font-size: 22px;
      line-height: 1.2;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    h1::before {
      content: '●';
      display: inline-block;
      margin-right: 8px;
      color: var(--blue);
      font-size: 16px;
      transform: translateY(-1px);
    }

    .subtitle {
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }

    .loading, .empty-state {
      padding: 40px 16px;
      text-align: center;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 20px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      margin: 0 auto 12px;
      border-radius: 50%;
      border: 3px solid var(--blue-soft);
      border-top-color: var(--blue);
      animation: spin .9s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .card {
      margin-bottom: 12px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .card-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat-item {
      padding: 14px;
      border-radius: 16px;
      background: var(--surface-2);
    }

    .stat-value {
      color: var(--text);
      font-size: 26px;
      line-height: 1.1;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .stat-label {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .tab-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      padding: 4px;
      border-radius: 999px;
      background: var(--surface-2);
    }

    button {
      width: 100%;
      border: 0;
      cursor: pointer;
      font-family: inherit;
      transition: background .16s ease, color .16s ease, box-shadow .16s ease, transform .16s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .tab-btn {
      padding: 8px 6px;
      border-radius: 999px;
      color: var(--muted);
      background: transparent;
      font-size: 12px;
      font-weight: 500;
    }

    .tab-btn.active {
      color: var(--blue);
      background: var(--surface);
      box-shadow: 0 1px 2px rgba(60,64,67,.18);
    }

    .chart-container {
      position: relative;
      height: 200px;
      margin-top: 14px;
    }

    .chart-container canvas { max-height: 220px; }

    .category-item { margin-bottom: 14px; }
    .category-header { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
    .category-icon { font-size: 16px; }
    .category-name { flex: 1; color: var(--text); font-size: 13px; font-weight: 500; }
    .category-percentage { color: var(--blue); font-size: 13px; font-weight: 600; }
    .category-bar { height: 6px; overflow: hidden; border-radius: 999px; background: var(--surface-2); }
    .category-bar-fill { height: 100%; border-radius: inherit; background: var(--blue); transition: width .3s ease; }
    .category-meta { margin-top: 6px; color: var(--muted); font-size: 11px; }

    .category-item-compact, .record-item {
      padding: 9px 0;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
    }
    .category-item-compact { display: flex; align-items: center; gap: 8px; }
    .category-item-compact:last-child, .record-item:last-child { border-bottom: 0; }
    .category-item-compact .category-name { flex: 1; }
    .category-item-compact .category-value { color: var(--blue); font-weight: 600; }
    .record-list { max-height: 190px; overflow-y: auto; }
    .record-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; color: var(--text); }
    .record-meta { margin-top: 4px; color: var(--muted); font-size: 11px; }

    .blackhole-item, .goal-item {
      padding: 12px;
      margin-bottom: 8px;
      border-radius: 14px;
      background: var(--surface-2);
    }

    .blackhole-item { background: var(--red-soft); }
    .blackhole-header, .goal-header, .goal-meta { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .blackhole-domain, .goal-type { color: var(--text); font-weight: 600; font-size: 13px; }
    .blackhole-duration { color: var(--red); font-weight: 700; font-size: 13px; }
    .blackhole-meta, .goal-meta { margin-top: 6px; color: var(--muted); font-size: 11px; }

    .attention-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px; }
    .attention-stat-item { padding: 12px; border-radius: 14px; background: var(--blue-soft); }
    .attention-stat-value { color: var(--blue); font-size: 22px; line-height: 1.1; font-weight: 700; }
    .attention-stat-label { color: var(--muted); font-size: 11px; }

    .goal-status { padding: 3px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .goal-status.achieved { background: var(--green-soft); color: var(--green); }
    .goal-status.warning { background: var(--yellow-soft); color: #b06000; }
    .goal-status.normal { background: var(--blue-soft); color: var(--blue); }
    .goal-progress-bar { height: 6px; margin-top: 10px; overflow: hidden; border-radius: 999px; background: #e0e3e7; }
    .goal-progress-fill { height: 100%; background: var(--green); border-radius: inherit; }
    .goal-progress-fill.warning { background: var(--yellow); }
    .goal-delete { cursor: pointer; color: var(--muted); font-size: 18px; margin-left: 6px; }
    .goal-delete:hover { color: var(--red); }

    .actions {
      position: sticky;
      bottom: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 12px 0 2px;
      background: linear-gradient(transparent, var(--bg) 24%);
      z-index: 20;
    }

    .action-btn, #addGoalBtn, #saveGoalBtn {
      min-height: 40px;
      padding: 10px 12px;
      border-radius: 999px;
      background: var(--surface);
      color: var(--blue);
      border: 1px solid var(--line);
      font-size: 13px;
      font-weight: 600;
    }

    #syncBtn, #aiAnalysisBtn, #saveGoalBtn {
      border-color: transparent;
      background: var(--blue);
      color: #fff;
    }

    #addGoalBtn { margin-top: 12px; background: var(--blue-soft); border-color: transparent; }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(32,33,36,.38);
    }

    .modal-content {
      width: min(100%, 360px);
      max-height: 82vh;
      overflow-y: auto;
      position: relative;
      padding: 22px;
      border-radius: 24px;
      color: var(--text);
      background: var(--surface);
      box-shadow: 0 8px 28px rgba(60,64,67,.28);
    }
    .modal-close { position: absolute; top: 12px; right: 16px; cursor: pointer; color: var(--muted); font-size: 24px; }
    .modal-close:hover { color: var(--text); }
    .ai-section { margin-bottom: 18px; }
    .ai-section h3 { margin-bottom: 9px; color: var(--blue); font-size: 14px; }
    .ai-section p, .ai-section li { line-height: 1.6; font-size: 13px; }
    .ai-section ul { list-style: none; padding: 0; }
    .ai-section li { padding: 8px 0; border-bottom: 1px solid var(--line); }
    .ai-loading { text-align: center; padding: 38px; }

    label { display: block; margin-bottom: 8px; font-size: 12px; font-weight: 600; }
    select, input {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface);
      color: var(--text);
      outline: none;
    }
    select:focus, input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-soft); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>BrowseMind</h1>
        <p class="subtitle">浏览行为分析</p>
      </div>
    </header>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>正在加载数据...</p>
    </div>

    <div id="content" style="display: none;">
      <div class="card">
        <div class="card-title">今日概览</div>
        <div class="stat-grid">
          <div class="stat-item">
            <div class="stat-value" id="todayVisits">0</div>
            <div class="stat-label">访问次数</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="todayDuration">0分钟</div>
            <div class="stat-label">浏览时长</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">可视化分析</div>
        <div class="tab-buttons">
          <button class="tab-btn active" data-chart="pie">分类占比</button>
          <button class="tab-btn" data-chart="bar">时间分布</button>
          <button class="tab-btn" data-chart="line">每日趋势</button>
        </div>
        <div class="chart-container">
          <canvas id="mainChart"></canvas>
        </div>
      </div>

      <div class="card">
        <div class="card-title">今日分类</div>
        <div id="todayCategoryStats"></div>
      </div>

      <div class="card">
        <div class="card-title"><span id="categoryStatsLabel">7 天</span>分类</div>
        <div id="categoryStats"></div>
      </div>

      <div class="card">
        <div class="card-title"><span id="weeklyStatsLabel">7 天</span>统计</div>
        <div class="stat-grid">
          <div class="stat-item">
            <div class="stat-value" id="totalVisits">0</div>
            <div class="stat-label">总访问</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="uniqueSites">0</div>
            <div class="stat-label">独立网站</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">最近访问</div>
        <div class="record-list" id="recentRecords"></div>
      </div>

      <div class="card">
        <div class="card-title">今日目标</div>
        <div id="goalsContainer">
          <p style="text-align: center; color: #5f6368; padding: 20px;">暂无目标</p>
        </div>
        <button id="addGoalBtn">添加目标</button>
      </div>

      <div class="card">
        <div class="card-title">时间黑洞</div>
        <div id="blackholeStats">
          <p style="text-align: center; color: #5f6368; padding: 20px;">同步后自动更新</p>
        </div>
      </div>

      <div class="card">
        <div class="card-title">注意力曲线</div>
        <div class="chart-container" style="height: 150px;">
          <canvas id="attentionChart"></canvas>
        </div>
        <div id="attentionStats" style="margin-top: 12px;">
          <p style="text-align: center; color: #5f6368;">同步后自动更新</p>
        </div>
      </div>

      <div class="actions">
        <button class="action-btn" id="refreshBtn">刷新</button>
        <button class="action-btn" id="dashboardBtn">仪表盘</button>
        <button class="action-btn" id="syncBtn">同步</button>
        <button class="action-btn" id="aiAnalysisBtn">AI 分析</button>
      </div>
    </div>

    <div id="aiAnalysisModal" class="modal" style="display: none;">
      <div class="modal-content">
        <span class="modal-close" id="closeModal">&times;</span>
        <h2 style="font-size: 20px; margin-bottom: 16px; font-weight: 600;">AI 智能分析</h2>
        <div id="aiAnalysisContent"></div>
      </div>
    </div>

    <div id="goalModal" class="modal" style="display: none;">
      <div class="modal-content">
        <span class="modal-close" id="closeGoalModal">&times;</span>
        <h2 style="font-size: 20px; margin-bottom: 16px; font-weight: 600;">设置目标</h2>
        <div style="margin-bottom: 16px;">
          <label>目标类型</label>
          <select id="goalTypeSelect">
            <option value="daily_learning">每日学习时长</option>
            <option value="daily_entertainment">每日娱乐时长限制</option>
            <option value="daily_coding">每日编程时长</option>
            <option value="daily_social">每日社交时长限制</option>
          </select>
        </div>
        <div style="margin-bottom: 16px;">
          <label>目标时长（分钟）</label>
          <input type="number" id="goalDurationInput" min="1" max="1440" value="60">
        </div>
        <button id="saveGoalBtn">保存目标</button>
      </div>
    </div>

    <div id="emptyState" class="empty-state" style="display: none;">
      <div style="font-size: 42px; color: #1a73e8;">●</div>
      <p>暂无浏览数据</p>
      <p style="font-size: 12px; margin-top: 8px;">开始浏览网页后自动生成统计</p>
    </div>
  </div>

  <script src="chart.min.js"></script>
  <script src="dataProcessor.js"></script>
  <script src="dataSync.js"></script>
  <script src="popup.js"></script>
</body>
</html>
