<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrowseMind</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    body {
      width: 420px;
      min-height: 520px;
      max-height: 640px;
      overflow-y: auto;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
      color: var(--text);
      background: var(--bg);
      font-size: 14px;
      line-height: 1.5;
    }

    .container { padding: var(--space-5) 18px var(--space-4); }

    header { margin-bottom: var(--space-5); }
    h1 {
      font-size: 26px;
      line-height: 1.15;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }
    .brand-mark {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }
    .brand-mark svg { display: block; width: 100%; height: 100%; }
    .subtitle {
      margin-top: var(--space-1);
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.01em;
    }

    .loading, .empty-state {
      padding: 48px 20px;
      text-align: center;
      color: var(--muted);
      border-radius: var(--radius-md);
      background: var(--accent-glow);
      border: 1px dashed var(--line);
    }
    .spinner {
      width: 28px;
      height: 28px;
      margin: 0 auto 14px;
      border-radius: 50%;
      border: 3px solid var(--accent-soft);
      border-top-color: var(--accent);
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Stat bar — asymmetric, not a grid */
    .stat-bar {
      display: flex;
      gap: 2px;
      margin-bottom: 18px;
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .stat-block {
      flex: 1;
      padding: 16px 14px;
      background: var(--surface);
      min-width: 0;
      transition: box-shadow 0.2s var(--ease-out), transform 0.2s var(--ease-out);
    }
    .stat-block:hover { box-shadow: 0 2px 8px oklch(18% 0.012 58 / 0.08); transform: translateY(-1px); }
    .stat-block:first-child {
      flex: 1.35;
      border-radius: var(--radius-md) 0 0 var(--radius-md);
    }
    .stat-block:last-child {
      border-radius: 0 var(--radius-md) var(--radius-md) 0;
    }
    .stat-block:only-child { border-radius: var(--radius-md); }
    .stat-value {
      font-size: 26px;
      line-height: 1.05;
      font-weight: 700;
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }
    .stat-block:first-child .stat-value {
      font-size: 40px;
      letter-spacing: -0.04em;
      color: var(--accent);
    }
    .stat-label {
      margin-top: var(--space-1);
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    /* Chart card */
    .chart-card {
      margin-bottom: var(--space-4);
      padding: var(--space-4) 18px var(--space-4);
      border-radius: var(--radius-md);
      background: var(--surface);
      border-top: 2.5px solid var(--accent);
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s var(--ease-out);
    }
    .chart-card:hover { box-shadow: 0 2px 8px oklch(18% 0.012 58 / 0.1); }
    .chart-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-4);
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
    }
    .chart-tabs {
      display: flex;
      gap: 2px;
      padding: 4px;
      border-radius: var(--radius-sm);
      background: var(--surface-2);
    }
    .chart-tab {
      all: unset;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: var(--radius-sm);
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      background: transparent;
      transition: background 0.2s var(--ease-out), color 0.2s var(--ease-out);
    }
    .chart-tab:hover { color: var(--text); }
    .chart-tab:focus-visible { outline: none; box-shadow: 0 0 0 3px var(--accent-glow); }
    .chart-tab.active {
      color: var(--accent);
      background: var(--surface);
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .chart-container {
      position: relative;
      height: 190px;
    }
    .chart-container canvas { max-height: 210px; }

    /* Section dividers — not cards */
    .section {
      margin-bottom: 16px;
    }
    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 10px;
      padding: 0 2px;
    }
    .section-sub {
      color: var(--muted);
      font-size: 11px;
    }

    .category-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      margin-bottom: 4px;
      background: var(--surface);
      transition: background 0.15s var(--ease-out), box-shadow 0.2s var(--ease-out), transform 0.2s var(--ease-out);
    }
    .category-item:hover { background: var(--surface-2); box-shadow: 0 1px 4px oklch(18% 0.012 58 / 0.06); transform: translateY(-1px); }
    .category-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .category-name { flex: 1; font-size: 13px; font-weight: 500; color: var(--text); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .category-meta { color: var(--muted); font-size: 11.5px; white-space: nowrap; }
    .category-bar { height: 5px; margin-top: 6px; border-radius: 999px; background: var(--surface-2); overflow: hidden; }
    .category-bar-fill { height: 100%; border-radius: inherit; background: var(--accent); transition: width 0.4s var(--ease-out); will-change: width; }

    .category-item-compact {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--line);
      font-size: 12.5px;
      transition: background 0.15s var(--ease-out);
    }
    .category-item-compact:hover { background: var(--surface-2); margin: 0 -6px; padding: 8px 6px; border-radius: var(--radius-sm); }
    .category-item-compact:last-child { border-bottom: 0; }
    .category-item-compact .category-name { flex: 1; }
    .category-item-compact .category-value { color: var(--accent); font-weight: 600; font-variant-numeric: tabular-nums; }

    .record-list { max-height: 180px; overflow-y: auto; }
    .record-item {
      padding: 10px;
      border-radius: var(--radius-sm);
      margin-bottom: 2px;
      background: var(--surface);
      font-size: 12.5px;
      transition: background 0.15s var(--ease-out), transform 0.2s var(--ease-out);
    }
    .record-item:hover { background: var(--surface-2); transform: translateY(-1px); }
    .record-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
    .record-meta { margin-top: 3px; color: var(--muted); font-size: 11px; font-variant-numeric: tabular-nums; }

    .blackhole-item {
      padding: 12px 14px;
      margin-bottom: 6px;
      border-radius: var(--radius-md);
      background: var(--red-soft);
      font-size: 12.5px;
      border-left: 3px solid var(--red);
      transition: box-shadow 0.2s var(--ease-out), transform 0.2s var(--ease-out);
    }
    .blackhole-item:hover { box-shadow: 0 2px 8px oklch(52% 0.16 25 / 0.12); transform: translateY(-1px); }
    .blackhole-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .blackhole-domain { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
    .blackhole-duration { color: var(--red); font-weight: 700; font-variant-numeric: tabular-nums; }
    .blackhole-meta { margin-top: 5px; color: var(--muted); font-size: 11px; }

    .goal-item {
      padding: 12px 14px;
      margin-bottom: 6px;
      border-radius: var(--radius-md);
      background: var(--surface);
      font-size: 12.5px;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s var(--ease-out), transform 0.2s var(--ease-out);
    }
    .goal-item:hover { box-shadow: 0 2px 8px oklch(18% 0.012 58 / 0.08); transform: translateY(-1px); }
    .goal-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .goal-type { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .goal-meta { margin-top: 6px; display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--muted); }
    .goal-progress-bar { height: 4px; margin-top: 8px; border-radius: 999px; background: var(--surface-2); overflow: hidden; }
    .goal-progress-fill { height: 100%; border-radius: inherit; background: var(--green); transition: width 0.6s cubic-bezier(0.25, 1, 0.5, 1); will-change: width; }
    .goal-progress-fill.warning { background: var(--yellow); }
    .goal-item.achieved { animation: goalCelebrate 0.5s cubic-bezier(0.25, 1, 0.5, 1); border-left: 3px solid var(--green); }
    .goal-delete { cursor: pointer; color: var(--muted); font-size: 16px; line-height: 1; padding: 2px; background: transparent; border: 0; min-width: 44px; min-height: 44px; display: inline-flex; align-items: center; justify-content: center; border-radius: var(--radius-sm); transition: color 0.15s var(--ease-out), background 0.15s var(--ease-out); }
    .goal-delete:hover { color: var(--red); background: var(--red-soft); }
    .goal-delete:focus-visible { outline: none; box-shadow: 0 0 0 3px var(--accent-glow); }

    .attention-stats { display: flex; gap: 10px; margin-top: 8px; }
    .attention-stat-item {
      flex: 1;
      padding: 12px;
      border-radius: var(--radius-md);
      background: var(--accent-soft);
      transition: box-shadow 0.2s var(--ease-out), transform 0.2s var(--ease-out);
    }
    .attention-stat-item:hover { box-shadow: 0 2px 8px oklch(52% 0.14 275 / 0.12); transform: translateY(-1px); }
    .attention-stat-value { color: var(--accent); font-size: 22px; line-height: 1.1; font-weight: 700; font-variant-numeric: tabular-nums; }
    .attention-stat-label { color: var(--muted); font-size: 11px; margin-top: 3px; }

    /* Action bar */
    .actions {
      position: sticky;
      bottom: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 14px 0 4px;
      background: linear-gradient(transparent, var(--bg) 28%);
      z-index: 20;
    }
    .action-btn {
      flex: 1;
      min-height: 42px;
      padding: 10px;
      border: 0;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--line);
      transition: background 0.18s var(--ease-out), color 0.18s var(--ease-out), box-shadow 0.18s var(--ease-out), transform 0.1s var(--ease-out), border-color 0.18s var(--ease-out);
    }
    .action-btn:hover { background: var(--surface-2); border-color: var(--surface-3); transform: translateY(-1px); box-shadow: 0 2px 6px oklch(18% 0.012 58 / 0.06); }
    .action-btn:active { transform: scale(0.97); box-shadow: none; }
    .action-btn:focus-visible { outline: none; box-shadow: 0 0 0 3px var(--accent-glow); }
    .action-btn.primary {
      background: var(--accent);
      color: oklch(100% 0 0);
      border-color: var(--accent);
      box-shadow: 0 2px 8px oklch(52% 0.14 275 / 0.25);
    }
    .action-btn.primary:hover { background: color-mix(in oklch, var(--accent) 85%, black); box-shadow: 0 4px 12px oklch(52% 0.14 275 / 0.35); }
    .action-btn.secondary {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: transparent;
    }
    .action-btn.secondary:hover { background: color-mix(in oklch, var(--accent) 20%, var(--surface)); }
    .action-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: oklch(0% 0 0 / 0.4);
      backdrop-filter: blur(4px);
      animation: modalFadeIn 0.2s var(--ease-out);
    }
    @keyframes modalFadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-content {
      width: min(100%, 360px);
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
      padding: 24px;
      border-radius: var(--radius-md);
      color: var(--text);
      background: var(--surface);
      box-shadow: 0 16px 48px oklch(0% 0 0 / 0.2);
      animation: modalSlideUp 0.25s var(--ease-out);
    }
    @keyframes modalSlideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .modal-close {
      position: absolute;
      top: 12px; right: 16px;
      cursor: pointer;
      color: var(--muted);
      font-size: 22px;
      line-height: 1;
      background: transparent;
      border: 0;
      padding: 4px;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-sm);
      transition: color 0.15s var(--ease-out), background 0.15s var(--ease-out);
    }
    .modal-close:hover { color: var(--text); background: var(--surface-2); }
    .modal-close:focus-visible { outline: none; box-shadow: 0 0 0 3px var(--accent-glow); }
    .modal h2 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 18px;
    }
    .ai-section { margin-bottom: 16px; }
    .ai-section h3 { margin-bottom: 8px; color: var(--accent); font-size: 13px; font-weight: 600; padding-left: 10px; border-left: 3px solid var(--accent); }
    .ai-section p, .ai-section li { line-height: 1.6; font-size: 13px; }
    .ai-section ul { list-style: none; padding: 0; }
    .ai-section li { padding: 8px 0; border-bottom: 1px solid var(--line); }
    .ai-section li:last-child { border-bottom: 0; }
    .ai-loading { text-align: center; padding: 38px; }



  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><span class="brand-mark"><svg viewBox="0 0 22 22" fill="none"><rect x="1" y="1" width="20" height="20" rx="4" fill="var(--accent)"/><g transform="translate(3.5,3) scale(0.62)" stroke="oklch(100% 0 0)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"><path d="M12 2a7 7 0 00-4.6 1.7A5.5 5.5 0 003 9a5.5 5.5 0 002.2 4.5A4.5 4.5 0 009.5 18h1a.5.5 0 00.5-.5V16a2 2 0 012-2h0a2 2 0 012 2v1.5a.5.5 0 00.5.5h1a4.5 4.5 0 004.3-4.5A5.5 5.5 0 0021 9a5.5 5.5 0 00-4.4-5.3A7 7 0 0012 2z"/><path d="M9 13v-1a3 3 0 016 0v1"/></g></svg></span>BrowseMind</h1>
      <p class="subtitle">浏览行为分析 <span id="connStatus" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--muted);vertical-align:middle;margin-left:4px;" title="检查连接中..."></span></p>
    </header>

    <div id="currentSiteBar" style="display:none;padding:8px 12px;margin-bottom:8px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);font-size:12px;justify-content:space-between;align-items:center;box-shadow:var(--shadow);">
      <span id="currentSiteName" style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60%;"></span>
      <span id="currentSiteTime" style="color:var(--muted);font-variant-numeric:tabular-nums;"></span>
    </div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p id="loadingMsg" style="font-size:13px;">正在唤醒分析引擎...</p>
    </div>

    <div id="content" style="display: none;">
      <div class="stat-bar" id="todayOverview">
        <div class="stat-block">
          <div class="stat-value" id="todayDuration">0m</div>
          <div class="stat-label">今日时长</div>
        </div>
        <div class="stat-block">
          <div class="stat-value" id="todayVisits">0</div>
          <div class="stat-label">今日访问</div>
        </div>
        <div class="stat-block">
          <div class="stat-value" id="habitScore">--</div>
          <div class="stat-label">习惯评分</div>
        </div>
      </div>

      <div id="summaryCard" style="display:none;padding:10px 12px;margin-bottom:var(--space-4);border-radius:var(--radius-sm);background:var(--surface);border:1px solid var(--line);font-size:12px;color:var(--muted);align-items:center;gap:var(--space-3);box-shadow:var(--shadow);"></div>

      <div class="chart-card">
        <div class="chart-card-header">
          <span>可视化分析</span>
          <div class="chart-tabs">
            <button class="chart-tab active" data-chart="pie">占比</button>
            <button class="chart-tab" data-chart="bar">时段</button>
            <button class="chart-tab" data-chart="line">趋势</button>
          </div>
        </div>
        <div class="chart-container">
          <canvas id="mainChart"></canvas>
        </div>
      </div>

      <div class="section">
        <div class="section-header">
          <span class="section-title">今日分类</span>
        </div>
        <div id="todayCategoryStats"></div>
      </div>

      <div class="section">
        <div class="section-header">
          <span class="section-title"><span id="categoryStatsLabel">7 天</span>分类</span>
          <span class="section-sub">按时长</span>
        </div>
        <div id="categoryStats"></div>
      </div>

      <div class="section">
        <div class="section-header">
          <span class="section-title"><span id="weeklyStatsLabel">7 天</span>统计</span>
        </div>
        <div class="stat-bar">
          <div class="stat-block">
            <div class="stat-value" id="totalVisits">0</div>
            <div class="stat-label">总访问</div>
          </div>
          <div class="stat-block">
            <div class="stat-value" id="uniqueSites">0</div>
            <div class="stat-label">独立网站</div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-header">
          <span class="section-title">最近访问</span>
        </div>
        <input type="search" id="recordSearchInput" placeholder="搜索域名或标题..." aria-label="搜索访问记录" style="width:100%;padding:6px 10px;margin-bottom:8px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:12px;box-sizing:border-box;">
        <div class="record-list" id="recentRecords"></div>
      </div>

      <div class="section">
        <div class="section-header">
          <span class="section-title">今日目标</span>
        </div>
        <div id="goalsContainer">
          <p class="empty-line">设定一个今日目标，开始追踪进度</p>
        </div>
        <button id="addGoalBtn" class="action-btn secondary" style="width:100%;margin-top:6px;">添加目标</button>
      </div>

      <div class="section">
        <div class="section-header">
          <span class="section-title">时间黑洞</span>
        </div>
        <div id="blackholeStats">
          <p class="empty-line">同步后自动更新</p>
        </div>
      </div>

      <div class="section">
        <div class="section-header">
          <span class="section-title">专注曲线</span>
        </div>
        <div class="chart-container" style="height: 140px; margin-bottom: 8px;">
          <canvas id="attentionChart"></canvas>
        </div>
        <div id="attentionStats">
          <p class="empty-line">同步后自动更新</p>
        </div>
      </div>

      <div id="focusStatusBar" style="display:none;margin-bottom:10px;padding:8px 12px;background:var(--accent-soft);border:1px solid color-mix(in oklch, var(--accent) 20%, transparent);border-radius:var(--radius-sm);font-size:12px;justify-content:space-between;align-items:center;">
        <span id="focusStatusText"></span>
        <button class="action-btn danger" id="focusStopBtn" style="font-size:11px;padding:3px 10px;min-height:28px;">停止</button>
      </div>
      <div class="actions">
        <button class="action-btn" id="refreshBtn">刷新</button>
        <button class="action-btn" id="dashboardBtn">仪表盘</button>
        <button class="action-btn primary" id="syncBtn">同步</button>
        <button class="action-btn secondary" id="aiAnalysisBtn">AI 分析</button>
        <button class="action-btn" id="focusBtn">专注</button>
      </div>
    </div>

    <div id="aiAnalysisModal" class="modal" role="dialog" aria-modal="true" aria-label="AI 分析结果" style="display: none;">
      <div class="modal-content">
        <button class="modal-close" id="closeModal" aria-label="关闭">&times;</button>
        <h2>AI 分析结果</h2>
        <div id="aiAnalysisContent"></div>
      </div>
    </div>

    <div id="goalModal" class="modal" role="dialog" aria-modal="true" aria-label="设置目标" style="display: none;">
      <div class="modal-content">
        <button class="modal-close" id="closeGoalModal" aria-label="关闭">&times;</button>
        <h2>设置目标</h2>
        <div style="margin-bottom: 16px;">
          <label for="goalTypeSelect">目标类型</label>
          <select id="goalTypeSelect">
            <option value="daily_learning">每日学习时长</option>
            <option value="daily_entertainment">每日娱乐时长限制</option>
            <option value="daily_coding">每日编程时长</option>
            <option value="daily_social">每日社交时长限制</option>
          </select>
        </div>
        <div style="margin-bottom: 16px;">
          <label for="goalDurationInput">目标时长（分钟）</label>
          <input type="number" id="goalDurationInput" min="1" max="1440" value="60">
        </div>
        <button id="saveGoalBtn" class="action-btn primary" style="width:100%;">添加目标</button>
      </div>
    </div>

    <div id="focusDurationModal" class="modal" role="dialog" aria-modal="true" aria-label="选择专注时长" style="display: none;">
      <div class="modal-content">
        <button class="modal-close" id="closeFocusModal" aria-label="关闭">&times;</button>
        <h2>选择专注时长</h2>
        <div id="focusDurationButtons" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;"></div>
        <div style="display:flex;gap:8px;align-items:center;">
          <input type="number" id="focusCustomInput" min="1" max="240" placeholder="自定义" style="flex:1;">
          <button id="focusCustomBtn" class="action-btn" style="flex-shrink:0;">开始</button>
        </div>
      </div>
    </div>

    <div id="emptyState" class="empty-state" style="display: none;">
      <div style="margin-bottom: 10px;"><svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:36px;height:36px;"><path d="M12 2a7 7 0 00-4.6 1.7A5.5 5.5 0 003 9a5.5 5.5 0 002.2 4.5A4.5 4.5 0 009.5 18h1a.5.5 0 00.5-.5V16a2 2 0 012-2h0a2 2 0 012 2v1.5a.5.5 0 00.5.5h1a4.5 4.5 0 004.3-4.5A5.5 5.5 0 0021 9a5.5 5.5 0 00-4.4-5.3A7 7 0 0012 2z"/><path d="M9 13v-1a3 3 0 016 0v1"/></svg></div>
      <p style="font-size:14px;font-weight:600;">数据正在路上</p>
      <p style="font-size: 12px; margin-top: 6px; color: var(--muted);">正常浏览几个页面，这里就会自动亮起来</p>
    </div>
  </div>
