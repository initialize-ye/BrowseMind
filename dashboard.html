<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrowseMind Dashboard</title>
  <style>
    :root {
      --bg: #f8fafd;
      --surface: #ffffff;
      --surface-2: #f1f3f4;
      --text: #202124;
      --muted: #5f6368;
      --line: #dadce0;
      --blue: #1a73e8;
      --blue-soft: #e8f0fe;
      --green: #188038;
      --red: #d93025;
      --yellow: #f9ab00;
      --shadow: 0 1px 2px rgba(60,64,67,.16), 0 1px 3px rgba(60,64,67,.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
      background: var(--bg);
    }

    .page {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 44px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #4285f4, #34a853, #fbbc04, #ea4335, #4285f4);
    }

    h1 {
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.1;
      letter-spacing: -0.04em;
      font-weight: 600;
    }

    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 14px;
    }

    .panel, .metric {
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .summary {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(280px, .8fr);
      gap: 16px;
      margin-bottom: 16px;
    }

    .intro {
      padding: 24px;
    }

    .intro h2 {
      margin-bottom: 8px;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .intro p {
      max-width: 680px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .status-panel {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 16px;
      padding: 20px;
    }

    .status-note {
      padding: 14px;
      border-radius: 16px;
      color: var(--blue);
      background: var(--blue-soft);
      line-height: 1.6;
      font-size: 13px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .metric {
      padding: 18px;
      min-height: 128px;
    }

    .metric span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
    }

    .metric strong {
      display: block;
      margin-top: 14px;
      font-size: clamp(30px, 4vw, 44px);
      line-height: 1;
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 1.15fr .85fr;
      gap: 16px;
      align-items: start;
    }

    .panel {
      padding: 20px;
      margin-bottom: 16px;
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .panel-title h2 {
      font-size: 18px;
      font-weight: 600;
    }

    .panel-title p {
      color: var(--muted);
      font-size: 12px;
    }

    .chart-box { position: relative; height: 320px; }
    .chart-box.small { height: 240px; }

    .category-row, .domain-row {
      display: grid;
      gap: 12px;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
    }

    .category-row { grid-template-columns: 120px 1fr auto; }
    .domain-row { grid-template-columns: 1fr auto; }
    .category-row:last-child, .domain-row:last-child { border-bottom: 0; }

    .bar-track {
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: var(--surface-2);
    }

    .bar-fill {
      height: 100%;
      border-radius: inherit;
      background: var(--blue);
    }

    .domain-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 600;
    }

    .domain-meta, .category-meta {
      color: var(--muted);
      font-size: 12px;
    }

    .empty {
      padding: 42px 20px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 18px;
      background: var(--surface-2);
    }

    button {
      border: 0;
      cursor: pointer;
      border-radius: 999px;
      padding: 10px 16px;
      color: #fff;
      background: var(--blue);
      font-family: inherit;
      font-weight: 600;
      transition: background .16s ease, box-shadow .16s ease, transform .16s ease;
    }
    button:hover { background: #1765cc; box-shadow: var(--shadow); transform: translateY(-1px); }

    @media (max-width: 900px) {
      .summary, .dashboard-grid { grid-template-columns: 1fr; }
      .metric-grid { grid-template-columns: repeat(2, 1fr); }
      .topbar { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div class="brand">
        <div class="brand-dot"></div>
        <div>
          <h1>BrowseMind</h1>
          <p class="subtitle">简洁的浏览行为仪表盘</p>
        </div>
      </div>
      <button id="refreshDashboardBtn">刷新数据</button>
    </header>

    <section class="summary">
      <div class="intro panel">
        <h2>浏览概览</h2>
        <p>从本地浏览记录生成统计视图，帮助你快速了解最近 7 天的时间分布、常用站点和主要内容类型。</p>
      </div>
      <aside class="status-panel panel">
        <div>
          <div class="panel-title" style="margin-bottom: 10px;">
            <h2>今日状态</h2>
            <p id="todayDate">--</p>
          </div>
          <div class="status-note" id="statusNote">正在读取本地浏览数据...</div>
        </div>
      </aside>
    </section>

    <section class="metric-grid">
      <div class="metric"><span>今日访问</span><strong id="metricTodayVisits">0</strong></div>
      <div class="metric"><span>今日时长</span><strong id="metricTodayDuration">0m</strong></div>
      <div class="metric"><span>7 天访问</span><strong id="metricWeekVisits">0</strong></div>
      <div class="metric"><span>独立网站</span><strong id="metricUniqueSites">0</strong></div>
    </section>

    <section class="dashboard-grid">
      <div>
        <div class="panel">
          <div class="panel-title">
            <h2>7 天趋势</h2>
            <p>时长与访问次数</p>
          </div>
          <div class="chart-box"><canvas id="trendChart"></canvas></div>
        </div>

        <div class="panel">
          <div class="panel-title">
            <h2>分类构成</h2>
            <p>按停留时长排序</p>
          </div>
          <div id="categoryList"></div>
        </div>
      </div>

      <div>
        <div class="panel">
          <div class="panel-title">
            <h2>时间分布</h2>
            <p>按小时统计</p>
          </div>
          <div class="chart-box small"><canvas id="hourlyChart"></canvas></div>
        </div>

        <div class="panel">
          <div class="panel-title">
            <h2>高频站点</h2>
            <p>Top domains</p>
          </div>
          <div id="domainList"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="chart.min.js"></script>
  <script src="dataProcessor.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
