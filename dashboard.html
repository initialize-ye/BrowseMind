<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrowseMind Dashboard</title>
  <style>
    :root {
      --paper: #f4eddf;
      --paper-2: #fff8ec;
      --ink: #211d18;
      --muted: #746a5e;
      --line: rgba(33, 29, 24, .12);
      --amber: #d98c2b;
      --moss: #516b48;
      --clay: #a85338;
      --blue: #3f5f7f;
      --violet: #6b5678;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      color: var(--ink);
      font-family: ui-serif, Georgia, 'Times New Roman', 'Noto Serif SC', serif;
      background:
        radial-gradient(circle at 12% 8%, rgba(217,140,43,.22), transparent 28rem),
        radial-gradient(circle at 88% 20%, rgba(81,107,72,.18), transparent 26rem),
        linear-gradient(145deg, var(--paper), #fbf5ea 56%, #e9ddcc);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .32;
      background-image:
        linear-gradient(rgba(33,29,24,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(33,29,24,.045) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, black, transparent 88%);
    }

    .page {
      position: relative;
      width: min(1220px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 34px 0 48px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(320px, .7fr);
      gap: 22px;
      align-items: stretch;
      margin-bottom: 22px;
    }

    .hero-panel, .panel {
      border: 1px solid var(--line);
      background: rgba(255, 248, 236, .78);
      box-shadow: 0 22px 70px rgba(58, 44, 29, .13);
      backdrop-filter: blur(14px);
    }

    .hero-panel {
      min-height: 260px;
      position: relative;
      overflow: hidden;
      padding: clamp(28px, 5vw, 56px);
      border-radius: 38px 38px 14px 38px;
    }

    .hero-panel::after {
      content: '';
      position: absolute;
      right: -90px;
      top: -110px;
      width: 310px;
      height: 310px;
      border-radius: 50%;
      border: 1px solid rgba(217,140,43,.32);
      box-shadow: inset 0 0 0 38px rgba(217,140,43,.06), inset 0 0 0 80px rgba(81,107,72,.04);
    }

    .eyebrow {
      font-family: ui-sans-serif, system-ui, sans-serif;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .22em;
      text-transform: uppercase;
    }

    h1 {
      position: relative;
      max-width: 760px;
      margin-top: 18px;
      font-size: clamp(44px, 7vw, 92px);
      line-height: .88;
      letter-spacing: -.075em;
      font-weight: 900;
    }

    .hero-copy {
      max-width: 580px;
      margin-top: 22px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    .quick-card {
      display: grid;
      gap: 14px;
      padding: 24px;
      border-radius: 18px 34px 34px 34px;
    }

    .sync-note {
      padding: 16px;
      border-radius: 18px;
      background: rgba(81,107,72,.1);
      border: 1px solid rgba(81,107,72,.16);
      color: var(--moss);
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: 13px;
      line-height: 1.6;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 22px;
    }

    .metric {
      min-height: 145px;
      padding: 20px;
      border-radius: 26px;
      border: 1px solid var(--line);
      background: rgba(255, 248, 236, .72);
    }

    .metric strong {
      display: block;
      margin-top: 14px;
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: clamp(30px, 4vw, 48px);
      line-height: 1;
      letter-spacing: -.06em;
    }

    .metric span {
      font-family: ui-sans-serif, system-ui, sans-serif;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 18px;
      align-items: start;
    }

    .panel {
      padding: 22px;
      border-radius: 28px;
      margin-bottom: 18px;
    }

    .panel.large { min-height: 400px; }

    .panel-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    .panel-title h2 {
      font-size: 25px;
      letter-spacing: -.04em;
    }

    .panel-title p {
      font-family: ui-sans-serif, system-ui, sans-serif;
      color: var(--muted);
      font-size: 12px;
    }

    .chart-box { position: relative; height: 320px; }
    .chart-box.small { height: 240px; }

    .category-row, .domain-row {
      display: grid;
      grid-template-columns: 120px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
      font-family: ui-sans-serif, system-ui, sans-serif;
    }

    .category-row:last-child, .domain-row:last-child { border-bottom: 0; }

    .bar-track {
      height: 9px;
      border-radius: 999px;
      background: rgba(33,29,24,.08);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--moss), var(--amber));
    }

    .domain-row { grid-template-columns: 1fr auto; }
    .domain-name { font-weight: 900; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .domain-meta, .category-meta { color: var(--muted); font-size: 12px; }

    .empty {
      padding: 50px 20px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 24px;
      background: rgba(255,255,255,.35);
    }

    button {
      border: 0;
      cursor: pointer;
      border-radius: 999px;
      padding: 12px 18px;
      color: #fff8ec;
      background: var(--ink);
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-weight: 900;
      transition: transform .18s ease, box-shadow .18s ease;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 12px 26px rgba(33,29,24,.18); }

    @media (max-width: 880px) {
      .page { width: min(100vw - 24px, 720px); padding-top: 18px; }
      .hero, .dashboard-grid { grid-template-columns: 1fr; }
      .metric-grid { grid-template-columns: repeat(2, 1fr); }
      h1 { font-size: clamp(42px, 14vw, 68px); }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="hero-panel">
        <div class="eyebrow">BrowseMind / Attention Atlas</div>
        <h1>看见时间的纹理。</h1>
        <p class="hero-copy">把零散的浏览痕迹变成一张可读的注意力地图：哪些网站真正推进了你，哪些时间悄悄漏走了。</p>
      </div>
      <aside class="quick-card panel">
        <div class="panel-title">
          <h2>今日状态</h2>
          <p id="todayDate">--</p>
        </div>
        <div class="sync-note" id="statusNote">正在读取本地浏览数据...</div>
        <button id="refreshDashboardBtn">刷新仪表盘</button>
      </aside>
    </section>

    <section class="metric-grid">
      <div class="metric"><span>今日访问</span><strong id="metricTodayVisits">0</strong></div>
      <div class="metric"><span>今日时长</span><strong id="metricTodayDuration">0m</strong></div>
      <div class="metric"><span>七天访问</span><strong id="metricWeekVisits">0</strong></div>
      <div class="metric"><span>独立网站</span><strong id="metricUniqueSites">0</strong></div>
    </section>

    <section class="dashboard-grid">
      <div>
        <div class="panel large">
          <div class="panel-title">
            <h2>七天节律</h2>
            <p>浏览时长与访问次数</p>
          </div>
          <div class="chart-box"><canvas id="trendChart"></canvas></div>
        </div>

        <div class="panel">
          <div class="panel-title">
            <h2>分类构成</h2>
            <p>按停留时长排序</p>
          </div>
          <div id="categoryList"></div>
        </div>
      </div>

      <div>
        <div class="panel">
          <div class="panel-title">
            <h2>注意力分布</h2>
            <p>24 小时</p>
          </div>
          <div class="chart-box small"><canvas id="hourlyChart"></canvas></div>
        </div>

        <div class="panel">
          <div class="panel-title">
            <h2>高频站点</h2>
            <p>Top domains</p>
          </div>
          <div id="domainList"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="chart.min.js"></script>
  <script src="dataProcessor.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
