name: Deploy to Ubuntu Server

on:
  push:
    branches:
      - main  # 推送到 main 分支时触发
    paths:
      - 'backend/**'  # 只有 backend 目录变化时才部署
  workflow_dispatch:  # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to Server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          # 进入项目目录
          cd /var/www/browsemind

          # 备份当前版本
          if [ -d "backend" ]; then
            cp -r backend backend_backup_$(date +%Y%m%d_%H%M%S) 2>/dev/null || true
          fi

          # 拉取最新代码
          git pull origin main

          # 进入 backend 目录
          cd backend

          # 创建虚拟环境（如果不存在）
          if [ ! -d "venv" ]; then
            echo "创建虚拟环境..."
            python3 -m venv venv
          fi

          # 激活虚拟环境
          source venv/bin/activate

          # 更新依赖
          pip install -r requirements.txt

          # 检查 systemd 服务是否存在
          if systemctl list-unit-files | grep -q browsemind.service; then
            echo "重启 systemd 服务..."
            sudo systemctl restart browsemind
            sleep 3
            sudo systemctl status browsemind --no-pager
          else
            echo "⚠️  systemd 服务不存在，尝试直接启动..."
            # 杀死旧进程
            pkill -f "python.*main.py" || true
            # 后台启动服务
            nohup python main.py > /var/log/browsemind.log 2>&1 &
            sleep 3
            echo "服务已启动，PID: $(pgrep -f 'python.*main.py')"
          fi

          echo "✅ 部署完成！"

    - name: Health Check
      run: |
        sleep 5
        response=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.SERVER_HOST }}:8000/)
        if [ $response -eq 200 ]; then
          echo "✅ 健康检查通过"
        else
          echo "❌ 健康检查失败，HTTP 状态码: $response"
          exit 1
        fi

    - name: Notify Success
      if: success()
      run: |
        echo "🎉 部署成功！"
        echo "服务器: ${{ secrets.SERVER_HOST }}"
        echo "时间: $(date)"

    - name: Notify Failure
      if: failure()
      run: |
        echo "❌ 部署失败！"
        echo "请检查日志"
