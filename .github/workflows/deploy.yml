name: Deploy to Ubuntu Server

on:
  push:
    branches:
      - main  # 推送到 main 分支时触发
    paths:
      - 'backend/**'  # 只有 backend 目录变化时才部署
  workflow_dispatch:  # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to Server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          set -e  # 遇到错误立即退出

          echo "=========================================="
          echo "开始部署 BrowseMind"
          echo "=========================================="

          # 进入项目目录
          echo "📁 进入项目目录..."
          cd /var/www/browsemind || { echo "❌ 项目目录不存在"; exit 1; }

          # 保护数据库文件（git reset 后不会被清理，但做显式备份以防万一）
          echo "💾 备份数据库..."
          DB_PATH="/var/www/browsemind/backend/browsemind.db"
          DB_BACKUP="/tmp/browsemind_backup_$(date +%Y%m%d_%H%M%S).db"
          if [ -f "$DB_PATH" ]; then
            cp "$DB_PATH" "$DB_BACKUP" || { echo "❌ 数据库备份失败"; exit 1; }
            echo "   数据库已备份到 $DB_BACKUP ($(du -h "$DB_PATH" | cut -f1))"
          fi

          # 清理旧备份目录（保留最近 3 个）
          echo "🧹 清理旧备份..."
          ls -dt /var/www/browsemind/backend_backup_* 2>/dev/null | tail -n +4 | xargs rm -rf 2>/dev/null || true
          ls -t /tmp/browsemind_backup_*.db 2>/dev/null | tail -n +4 | xargs rm -f 2>/dev/null || true

          # 拉取最新代码
          echo "📥 拉取最新代码..."
          git fetch origin main
          git reset --hard origin/main || { echo "❌ Git 同步失败"; exit 1; }

          # 恢复数据库文件
          if [ -n "$DB_BACKUP" ] && [ -f "$DB_BACKUP" ]; then
            if [ -f "$DB_PATH" ]; then
              # 如果数据库还在，比较大小决定是否恢复
              LIVE_SIZE=$(stat -c%s "$DB_PATH" 2>/dev/null || echo 0)
              BACKUP_SIZE=$(stat -c%s "$DB_BACKUP" 2>/dev/null || echo 0)
              if [ "$LIVE_SIZE" -lt 1024 ] && [ "$BACKUP_SIZE" -gt "$LIVE_SIZE" ]; then
                echo "⚠️  当前数据库过小 ($LIVE_SIZE B)，从备份恢复 ($BACKUP_SIZE B)..."
                cp "$DB_BACKUP" "$DB_PATH" || true
              fi
            else
              echo "⚠️  数据库文件不存在，从备份恢复..."
              cp "$DB_BACKUP" "$DB_PATH" || true
            fi
          fi

          # 进入 backend 目录
          echo "📂 进入 backend 目录..."
          cd backend || { echo "❌ backend 目录不存在"; exit 1; }

          # 创建虚拟环境（如果不存在）
          if [ ! -d "venv" ]; then
            echo "🔧 创建虚拟环境..."
            python3 -m venv venv || { echo "❌ 虚拟环境创建失败"; exit 1; }
          else
            echo "✅ 虚拟环境已存在"
          fi

          # 激活虚拟环境
          echo "🔌 激活虚拟环境..."
          source venv/bin/activate || { echo "❌ 虚拟环境激活失败"; exit 1; }

          # 更新依赖
          echo "📦 安装/更新依赖..."
          python -m pip install --upgrade pip || { echo "❌ pip 更新失败"; exit 1; }
          python -m pip install --upgrade --force-reinstall -r requirements.txt || { echo "❌ 依赖安装失败"; exit 1; }

          # 检查关键依赖版本
          echo "🔎 检查 Python 和关键依赖版本..."
          which python
          python --version
          python -c "import openai, httpx; print('openai', openai.__version__); print('httpx', httpx.__version__)" || { echo "❌ 依赖版本检查失败"; exit 1; }

          # 检查 .env 文件
          echo "🔍 检查环境变量配置..."
          if [ ! -f ".env" ]; then
            echo "⚠️  警告：.env 文件不存在，AI 功能可能无法使用"
          else
            echo "✅ .env 文件存在"
          fi

          # 检查 systemd 服务是否存在
          echo "🔄 重启服务..."
          if systemctl list-unit-files | grep -q browsemind.service; then
            echo "   使用 systemd 重启..."
            sudo systemctl restart browsemind || { echo "❌ 服务重启失败"; sudo journalctl -u browsemind -n 20 --no-pager; exit 1; }
            sleep 3
            sudo systemctl status browsemind --no-pager || true
          else
            echo "   ⚠️  systemd 服务不存在，使用直接启动..."
            # 杀死旧进程
            pkill -f "python.*main.py" || true
            sleep 1
            # 后台启动服务
            nohup python main.py > /var/log/browsemind.log 2>&1 &
            sleep 3
            if pgrep -f "python.*main.py" > /dev/null; then
              echo "   ✅ 服务已启动，PID: $(pgrep -f 'python.*main.py')"
            else
              echo "   ❌ 服务启动失败"
              tail -n 20 /var/log/browsemind.log 2>/dev/null || echo "无日志文件"
              exit 1
            fi
          fi

          echo ""
          echo "=========================================="
          echo "✅ 部署完成！"
          echo "=========================================="

    - name: Health Check
      run: |
        sleep 5
        response=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.SERVER_HOST }}:8000/)
        if [ $response -eq 200 ]; then
          echo "✅ 健康检查通过"
        else
          echo "❌ 健康检查失败，HTTP 状态码: $response"
          exit 1
        fi

    - name: Notify Success
      if: success()
      run: |
        echo "🎉 部署成功！"
        echo "服务器: ${{ secrets.SERVER_HOST }}"
        echo "时间: $(date)"

    - name: Notify Failure
      if: failure()
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          echo "❌ 部署失败！查看最近日志："
          echo ""
          echo "=== Git 状态 ==="
          cd /var/www/browsemind
          git status
          echo ""
          echo "=== 最近的 Git 日志 ==="
          git log -1 --oneline
          echo ""
          echo "=== Python 版本 ==="
          python3 --version
          echo ""
          echo "=== 后端虚拟环境依赖版本 ==="
          cd /var/www/browsemind/backend
          if [ -f "venv/bin/activate" ]; then
            source venv/bin/activate
            which python
            python --version
            python -c "import openai, httpx; print('openai', openai.__version__); print('httpx', httpx.__version__)" 2>/dev/null || echo "无法读取 openai/httpx 版本"
          else
            echo "虚拟环境不存在或不可激活"
          fi
          echo ""
          echo "=== 虚拟环境状态 ==="
          ls -la backend/venv 2>/dev/null || echo "虚拟环境不存在"
          echo ""
          echo "=== systemd 服务状态 ==="
          sudo systemctl status browsemind --no-pager -l 2>/dev/null || echo "服务不存在"
          echo ""
          echo "=== 最近 20 条服务日志 ==="
          sudo journalctl -u browsemind -n 20 --no-pager 2>/dev/null || echo "无法获取日志"
          echo ""
          echo "=== 进程状态 ==="
          ps aux | grep python | grep -v grep || echo "无 Python 进程"
          echo ""
          echo "=== 端口占用 ==="
          sudo netstat -tlnp | grep 8000 || echo "8000 端口未被占用"
